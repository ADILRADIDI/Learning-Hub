version: '3.8'

services:
  # ============================================
  # API Gateway
  # ============================================
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: learning-platform-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      COURSE_SERVICE_URL: http://course-service:3003
      ASSIGNMENT_SERVICE_URL: http://assignment-service:3004
      GRADING_SERVICE_URL: http://grading-service:3005
      COMMUNICATION_SERVICE_URL: http://communication-service:3006
    depends_on:
      - auth-service
      - user-service
      - course-service
      - assignment-service
      - grading-service
      - communication-service
    networks:
      - learning-platform
    volumes:
      - ./gateway:/app
      - /app/node_modules
    restart: unless-stopped

  # ============================================
  # Microservices
  # ============================================

  # Authentication Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: ../../docker/Dockerfile.service
    container_name: learning-platform-auth
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      SERVICE_NAME: auth-service
      MONGODB_URI: mongodb://mongodb:27017/auth-db
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRE: 24h
    depends_on:
      - mongodb
    networks:
      - learning-platform
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: ../../docker/Dockerfile.service
    container_name: learning-platform-user
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      SERVICE_NAME: user-service
      MONGODB_URI: mongodb://mongodb:27017/user-db
      AUTH_SERVICE_URL: http://auth-service:3001
    depends_on:
      - mongodb
      - auth-service
    networks:
      - learning-platform
    volumes:
      - ./services/user-service:/app
      - /app/node_modules
    restart: unless-stopped

  # Course Service
  course-service:
    build:
      context: ./services/course-service
      dockerfile: ../../docker/Dockerfile.service
    container_name: learning-platform-course
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      SERVICE_NAME: course-service
      MONGODB_URI: mongodb://mongodb:27017/course-db
    depends_on:
      - mongodb
    networks:
      - learning-platform
    volumes:
      - ./services/course-service:/app
      - /app/node_modules
    restart: unless-stopped

  # Assignment Service
  assignment-service:
    build:
      context: ./services/assignment-service
      dockerfile: ../../docker/Dockerfile.service
    container_name: learning-platform-assignment
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      SERVICE_NAME: assignment-service
      MONGODB_URI: mongodb://mongodb:27017/assignment-db
    depends_on:
      - mongodb
    networks:
      - learning-platform
    volumes:
      - ./services/assignment-service:/app
      - /app/node_modules
    restart: unless-stopped

  # Grading Service
  grading-service:
    build:
      context: ./services/grading-service
      dockerfile: ../../docker/Dockerfile.service
    container_name: learning-platform-grading
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      SERVICE_NAME: grading-service
      MONGODB_URI: mongodb://mongodb:27017/grading-db
      ASSIGNMENT_SERVICE_URL: http://assignment-service:3004
    depends_on:
      - mongodb
    networks:
      - learning-platform
    volumes:
      - ./services/grading-service:/app
      - /app/node_modules
    restart: unless-stopped

  # Communication Service
  communication-service:
    build:
      context: ./services/communication-service
      dockerfile: ../../docker/Dockerfile.service
    container_name: learning-platform-communication
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      SERVICE_NAME: communication-service
      MONGODB_URI: mongodb://mongodb:27017/communication-db
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - learning-platform
    volumes:
      - ./services/communication-service:/app
      - /app/node_modules
    restart: unless-stopped

  # ============================================
  # Databases
  # ============================================

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: learning-platform-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: learning-platform
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - learning-platform
    restart: unless-stopped

  # Redis
  redis:
    image: redis:latest
    container_name: learning-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - learning-platform
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  learning-platform:
    driver: bridge
